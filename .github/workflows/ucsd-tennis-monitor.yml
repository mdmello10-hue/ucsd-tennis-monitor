name: UCSD Tennis Monitor

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. This is 8:00 AM Los Angeles time during daylight saving time.
    - cron: "0 15 * * *"

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      UCSD_REC_USERNAME: ${{ secrets.UCSD_REC_USERNAME }}
      UCSD_REC_PASSWORD: ${{ secrets.UCSD_REC_PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_TO: ${{ secrets.ALERT_TO }}
      GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS || 'primary' }}
      POLL_DAYS: ${{ secrets.POLL_DAYS || '3' }}
      TIMEZONE: America/Los_Angeles
      GOOGLE_CREDENTIALS_PATH: credentials.json
      GOOGLE_TOKEN_PATH: .ucsd-tennis-monitor/google-token.json
      STATE_DB_PATH: .ucsd-tennis-monitor/state.sqlite3
      UCSD_STORAGE_STATE_PATH: .ucsd-tennis-monitor/ucsd-storage-state.json
      UCSD_HEADLESS: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore monitor state
        id: state-cache
        uses: actions/cache/restore@v4
        with:
          path: .ucsd-tennis-monitor/state.sqlite3
          key: ucsd-tennis-state-${{ github.run_id }}
          restore-keys: |
            ucsd-tennis-state-

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in UCSD_REC_USERNAME UCSD_REC_PASSWORD GMAIL_USER GMAIL_APP_PASSWORD ALERT_TO GOOGLE_CREDENTIALS_JSON GOOGLE_TOKEN_JSON; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: Write secret files
        shell: bash
        run: |
          mkdir -p .ucsd-tennis-monitor
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > .ucsd-tennis-monitor/google-token.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        run: python -m ucsd_tennis_monitor.monitor --once

      - name: Save monitor state
        if: always() && hashFiles('.ucsd-tennis-monitor/state.sqlite3') != ''
        uses: actions/cache/save@v4
        with:
          path: .ucsd-tennis-monitor/state.sqlite3
          key: ucsd-tennis-state-${{ github.run_id }}
